name: Build Android APK

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          cd lok-world-frontend
          npm install 2>&1 | head -50
      
      - name: Build
        run: |
          cd lok-world-frontend
          npm run build 2>&1 | head -50
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Install Capacitor
        run: |
          cd lok-world-frontend
          npm install @capacitor/core @capacitor/cli @capacitor/android
      
      - name: Init Capacitor
        run: |
          cd lok-world-frontend
          npx cap init "洛克世界频道" "com.lokworld.channel" --web-dir=dist
        continue-on-error: true

      - name: Add Android
        run: |
          cd lok-world-frontend
          npx cap add android
        continue-on-error: true

      - name: Sync
        run: |
          cd lok-world-frontend
          npx cap sync android
        continue-on-error: true

      - name: Build APK
        run: |
          cd lok-world-frontend/android
          chmod +x ./gradlew
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: lok-world-frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
