name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install frontend dependencies
        run: |
          cd lok-world-frontend
          npm install

      - name: Build web app
        run: |
          cd lok-world-frontend
          npm run build

      - name: Verify build output
        run: |
          ls -la lok-world-frontend/dist/

      - name: Install Capacitor
        run: |
          cd lok-world-frontend
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: |
          cd lok-world-frontend
          npx cap init "洛克世界频道" "com.lokworld.channel" --web-dir=dist

      - name: Add Android platform
        run: |
          cd lok-world-frontend
          npx cap add android

      - name: Sync Capacitor
        run: |
          cd lok-world-frontend
          npx cap sync android

      - name: Verify Android directory
        run: |
          ls -la lok-world-frontend/android/

      - name: Build Android APK
        id: build-apk
        run: |
          cd lok-world-frontend/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Verify APK output
        run: |
          ls -la lok-world-frontend/android/app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lok-world-channel-apk
          path: lok-world-frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
