name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Show directory structure
        run: |
          ls -la
          ls -la lok-world-frontend/

      - name: Install frontend dependencies
        run: |
          cd lok-world-frontend
          npm install --legacy-peer-deps
        continue-on-error: true

      - name: Show installed dependencies
        run: |
          cd lok-world-frontend
          ls -la node_modules/ 2>/dev/null | head -20 || echo "node_modules not found"

      - name: Build web app
        run: |
          cd lok-world-frontend
          npm run build
        continue-on-error: true

      - name: Show build output
        run: |
          ls -la lok-world-frontend/dist/ 2>/dev/null || echo "dist not found"

      - name: Install Capacitor
        run: |
          cd lok-world-frontend
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
        continue-on-error: true

      - name: Sync to Android
        run: |
          cd lok-world-frontend
          npx cap sync android
        continue-on-error: true

      - name: Show Android directory
        run: |
          ls -la lok-world-frontend/android/

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd lok-world-frontend/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
        continue-on-error: true

      - name: Show APK output
        run: |
          ls -la lok-world-frontend/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: lok-world-frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
